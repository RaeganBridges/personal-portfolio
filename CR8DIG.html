<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cr8Dig — Studio North</title>
    <link rel="icon" href="images/logo/LOGOMARK.png" type="image/png" />
    <link rel="apple-touch-icon" href="images/logo/LOGOMARK.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/nav-reveal.js" defer></script>
    <noscript>
      <style>
        .site-nav {
          transform: none !important;
          pointer-events: auto !important;
        }
      </style>
    </noscript>
  </head>
  <body>
    <nav class="site-nav" aria-label="Primary">
      <a class="site-nav__brand" href="index.html#home">
        <img src="images/logo/LOGOMARK.png" alt="Studio North" width="72" height="72" decoding="async" />
      </a>
      <div class="site-nav__links">
        <a href="index.html#home">Home</a>
        <a href="index.html#works-strips">Works</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>

    <article class="project-page project-page--split">
      <a class="project-back" href="index.html#works-strips">← Back to works</a>

      <div class="project-split">
        <div class="project-split__images">
          <section class="project-site-embed" aria-labelledby="cr8dig-embed-heading">
            <div class="project-site-embed__header">
              <h2 id="cr8dig-embed-heading" class="project-site-embed__title">Live site</h2>
              <a
                class="project-site-embed__open"
                href="https://raeganbridges.github.io/Cr8Dig/"
                target="_blank"
                rel="noopener noreferrer"
              >
                Open in new tab ↗
              </a>
            </div>
            <div class="project-site-embed__frame-wrap">
              <iframe
                class="project-site-embed__frame"
                src="https://raeganbridges.github.io/Cr8Dig/"
                title="Cr8Dig — embedded live website"
                loading="eager"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="fullscreen"
              ></iframe>
            </div>
          </section>
        </div>

        <section class="project-split__text" aria-labelledby="cr8dig-heading">
          <header class="project-page__intro">
            <h1 id="cr8dig-heading" class="project-split__wordmark">
              <img
                class="project-split__wordmark-img"
                src="images/works/CR8DIG/Name.png"
                alt="Cr8Dig"
                width="1285"
                height="562"
                decoding="async"
                loading="eager"
                fetchpriority="high"
              />
            </h1>
            <p class="project-meta">Digital · Web · Interactive</p>
            <p class="project-gallery__hint">
              Explore the live build in the preview, or open the deployment on GitHub Pages in a full
              window.
            </p>
          </header>
        </section>
      </div>
    </article>
  </body>
</html>
