<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delight — Studio North</title>
    <link rel="icon" href="images/logo/LOGOMARK.png" type="image/png" />
    <link rel="apple-touch-icon" href="images/logo/LOGOMARK.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/nav-reveal.js" defer></script>
    <script src="js/delight-gallery-config.js"></script>
    <script src="js/delight-gallery.js" defer></script>
    <script src="js/gallery-lightbox.js" defer></script>
    <noscript>
      <style>
        .site-nav {
          transform: none !important;
          pointer-events: auto !important;
        }
      </style>
    </noscript>
  </head>
  <body>
    <nav class="site-nav" aria-label="Primary">
      <a class="site-nav__brand" href="index.html#home">
        <img src="images/logo/LOGOMARK.png" alt="Studio North" width="72" height="72" decoding="async" />
      </a>
      <div class="site-nav__links">
        <a href="index.html#home">Home</a>
        <a href="index.html#works-strips">Works</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>

    <article class="project-page project-page--gallery project-page--split">
      <a class="project-back" href="index.html#works-strips">← Back to works</a>

      <div class="project-split">
        <div class="project-split__images">
          <div id="delight-gallery" class="project-gallery" role="list"></div>
        </div>

        <section class="project-split__text" aria-labelledby="delight-heading">
          <header class="project-page__intro">
            <h1 id="delight-heading" class="project-split__wordmark">
              <img
                class="project-split__wordmark-img"
                src="images/works/DELIGHT/logomark.png"
                alt="Delight logomark"
                width="468"
                height="162"
                decoding="async"
                loading="eager"
                fetchpriority="high"
              />
            </h1>
            <p class="project-meta">Campaign · Environmental · Photography documentation</p>
            <p class="project-gallery__hint">
              Reorder images or toggle wide layout in
              <code>js/delight-gallery-config.js</code>
              (<span class="project-gallery__hint-key">wide: true</span> = two columns in the image column).
            </p>
          </header>
        </section>
      </div>
    </article>
  </body>
</html>
